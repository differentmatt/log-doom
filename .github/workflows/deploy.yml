name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Frontend
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}

      # Backend
      - name: Install backend deps
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npx vitest run

      - name: Package backend
        run: |
          cd backend
          rm -rf node_modules
          npm ci --omit=dev
          zip -r ../backend.zip package.json handlers/ lib/ node_modules/
          cd ..

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy infrastructure
        run: |
          aws cloudformation deploy \
            --stack-name log-doom \
            --template-file infra/template.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              CertificateArn=${{ vars.ACM_CERTIFICATE_ARN }} \
              GoogleClientId=${{ vars.VITE_GOOGLE_CLIENT_ID }} \
              CreateOIDCProvider=${{ vars.CREATE_OIDC_PROVIDER }} \
            --no-fail-on-empty-changeset

      - name: Deploy to S3
        run: |
          # HTML — no cache (always revalidate)
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }} --delete \
            --exclude "assets/*" \
            --cache-control "no-cache"
          # Hashed assets — cache forever (Vite fingerprints filenames)
          aws s3 sync dist/assets/ s3://${{ vars.S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable"

      - name: Deploy Lambda functions
        run: |
          aws lambda update-function-code \
            --function-name log-doom-days \
            --zip-file fileb://backend.zip
          aws lambda update-function-code \
            --function-name log-doom-settings \
            --zip-file fileb://backend.zip

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Smoke test API
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            'https://logdoom.com/api/days?from=2026-01-01&to=2026-01-01')
          echo "API returned HTTP $STATUS"
          if [ "$STATUS" = "500" ]; then
            echo "::error::API smoke test failed"
            exit 1
          fi

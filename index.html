<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Doom</title>
    <meta name="description" content="Simple time tracking for engineering managers. Log hours by category, see where your time goes." />
    <meta property="og:title" content="Log Doom" />
    <meta property="og:description" content="Simple time tracking for engineering managers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://logdoom.com" />
    <meta name="theme-color" content="#18181b" />
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="/favicon-32.svg" />
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="/favicon-16.svg" />
    <script>
      if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
        document.querySelectorAll('link[rel="icon"]').forEach(function(el) {
          el.href = el.href.replace(/favicon-(\d+)\.svg/, 'favicon-$1-green.svg');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
